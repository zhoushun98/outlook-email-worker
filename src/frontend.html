<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlook 邮件管理</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Rajdhani:wght@500;700&display=swap');

        :root {
            color-scheme: light;
            --font-sans: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans CJK SC', 'IBM Plex Sans', sans-serif;
            --font-display: 'Rajdhani', 'DIN Alternate', 'Bahnschrift', 'PingFang SC', sans-serif;
            --font-mono: 'IBM Plex Mono', 'JetBrains Mono', 'SFMono-Regular', 'Menlo', 'Consolas', monospace;
            --bg: #e6edf5;
            --bg-alt: #f1f5fa;
            --bg-grid: rgba(148, 163, 184, 0.2);
            --bg-glow-a: rgba(37, 99, 235, 0.12);
            --bg-glow-b: rgba(14, 165, 233, 0.09);
            --surface: #fdfefe;
            --surface-soft: #f6f9fd;
            --surface-strong: #eef3f9;
            --text: #0e1a2b;
            --text-muted: #40516b;
            --text-light: #61748e;
            --border: #cad6e5;
            --border-strong: #aebfd5;
            --primary: #1f5fce;
            --primary-strong: #12439d;
            --primary-soft: #dbe8ff;
            --success: #1a7f4e;
            --success-soft: #dcf7e8;
            --warning: #9a5e12;
            --warning-soft: #fff2db;
            --danger: #bf2433;
            --danger-soft: #ffe1e5;
            --shadow-sm: 0 1px 2px rgba(11, 23, 39, 0.08), 0 8px 18px rgba(11, 23, 39, 0.03);
            --shadow-md: 0 12px 34px rgba(11, 23, 39, 0.14), 0 2px 6px rgba(11, 23, 39, 0.08);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 12px;
            --header-height: 64px;
            --ease-standard: cubic-bezier(0.23, 1, 0.32, 1);
            --duration-fast: 140ms;
            --duration-base: 220ms;
        }

        body[data-theme="dark"] {
            color-scheme: dark;
            --bg: #0a1320;
            --bg-alt: #121f31;
            --bg-grid: rgba(148, 163, 184, 0.08);
            --bg-glow-a: rgba(37, 99, 235, 0.2);
            --bg-glow-b: rgba(8, 145, 178, 0.16);
            --surface: #0f1b2a;
            --surface-soft: #132438;
            --surface-strong: #1a2f47;
            --text: #e8edf5;
            --text-muted: #becbda;
            --text-light: #98abc1;
            --border: #26425f;
            --border-strong: #335a80;
            --primary: #73a6ff;
            --primary-strong: #9abfff;
            --primary-soft: rgba(115, 166, 255, 0.18);
            --success: #55cb91;
            --success-soft: rgba(85, 203, 145, 0.15);
            --warning: #f4be69;
            --warning-soft: rgba(244, 190, 105, 0.18);
            --danger: #ff818b;
            --danger-soft: rgba(255, 129, 139, 0.2);
            --shadow-sm: 0 1px 1px rgba(0, 0, 0, 0.38), 0 8px 22px rgba(0, 0, 0, 0.24);
            --shadow-md: 0 16px 38px rgba(0, 0, 0, 0.45), 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            font-family: var(--font-sans);
            background:
                linear-gradient(var(--bg-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px),
                radial-gradient(circle at 0% 0%, var(--bg-glow-a) 0%, transparent 52%),
                radial-gradient(circle at 100% 6%, var(--bg-glow-b) 0%, transparent 48%),
                var(--bg);
            background-size: 24px 24px, 24px 24px, auto, auto, auto;
            color: var(--text);
            line-height: 1.45;
            letter-spacing: 0.01em;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        :focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .skip-link {
            position: fixed;
            left: 14px;
            top: -44px;
            background: var(--primary);
            color: #ffffff;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            z-index: 2500;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .skip-link:focus-visible {
            top: 12px;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: var(--header-height);
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 0 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            min-width: 190px;
        }

        .navbar-brand svg {
            width: 22px;
            height: 22px;
            color: var(--primary-strong);
        }

        .navbar-center {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .current-account {
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 8px 14px;
            max-width: 100%;
        }

        .current-account.show {
            display: inline-flex;
        }

        .current-account strong {
            color: var(--text);
            font-weight: 600;
            max-width: 360px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-btn {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            padding: 7px 12px;
            font-size: 13px;
            font-weight: 500;
            line-height: 1;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .navbar-btn:hover {
            background: var(--surface-soft);
            border-color: var(--border-strong);
            color: var(--text);
        }

        .navbar-btn.danger {
            color: var(--danger);
            border-color: #fca5a5;
            background: #fff7f7;
        }

        .navbar-btn.danger:hover {
            background: #feecec;
            border-color: #f87171;
        }

        .main-container {
            margin-top: var(--header-height);
            height: calc(100dvh - var(--header-height));
            padding: 14px 14px 0;
            display: grid;
            grid-template-columns: 260px 320px minmax(0, 1fr);
            gap: 12px;
        }

        @supports not (height: 100dvh) {
            .main-container {
                height: calc(100vh - var(--header-height));
            }
        }

        .group-panel,
        .account-panel,
        .content-area {
            min-height: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .group-panel,
        .account-panel {
            display: flex;
            flex-direction: column;
        }

        .panel-header,
        .account-panel-header {
            min-height: 56px;
            padding: 0 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg-alt);
        }

        .panel-title,
        .account-panel-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.01em;
        }

        .panel-action-btn {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            transition: border-color 0.2s ease, color 0.2s ease, background-color 0.2s ease;
        }

        .panel-action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-soft);
        }

        .group-list,
        .account-list,
        .email-list,
        #emailDetail {
            overflow-y: auto;
        }

        .group-list,
        .account-list {
            flex: 1;
            background: var(--surface);
        }

        .group-item {
            padding: 11px 14px;
            border-bottom: 1px solid #edf1f6;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .group-item:hover {
            background: #f8fbff;
        }

        .group-item.active {
            border-left-color: var(--primary);
            background: #eef4ff;
        }

        .group-row-1 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .group-color {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .group-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
        }

        .group-row-2 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 20px;
        }

        .group-count {
            padding: 2px 8px;
            border-radius: 999px;
            background: #eef2f7;
            color: var(--text-light);
            font-size: 11px;
            font-weight: 500;
        }

        .group-item.active .group-count {
            background: #dbeafe;
            color: #1e3a8a;
        }

        .group-actions {
            display: flex;
            gap: 5px;
            padding: 3px;
            border-radius: 10px;
            background: rgba(248, 250, 252, 0.94);
            border: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .group-item:hover .group-actions {
            opacity: 1;
        }

        .group-item.active .group-actions {
            opacity: 1;
        }

        .group-action-btn {
            border: 1px solid var(--border);
            border-radius: 7px;
            background: #ffffff;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
            padding: 4px 8px;
            cursor: pointer;
            transition: color 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
        }

        .group-action-btn:hover {
            color: var(--text);
            border-color: var(--border-strong);
            background: var(--surface-soft);
        }

        .group-action-btn.edit:hover {
            color: #1d4ed8;
            border-color: #93c5fd;
            background: #eff6ff;
        }

        .group-action-btn.delete {
            color: #991b1b;
            border-color: #fecaca;
            background: #fff7f7;
        }

        .group-action-btn.delete:hover {
            color: #7f1d1d;
            border-color: #f87171;
            background: #fee2e2;
        }

        .account-panel-title .group-color {
            width: 12px;
            height: 12px;
            border-radius: 4px;
        }

        .mobile-nav-btn {
            display: none;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 500;
            line-height: 1;
            cursor: pointer;
        }

        .mobile-nav-btn:hover {
            border-color: var(--border-strong);
            color: var(--text);
            background: var(--surface-soft);
        }

        .account-panel-footer {
            padding: 12px;
            border-top: 1px solid var(--border);
            background: var(--bg-alt);
        }

        .add-account-btn {
            width: 100%;
            border: 1px solid var(--primary);
            background: var(--primary);
            color: #ffffff;
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .add-account-btn:hover {
            background: var(--primary-strong);
            border-color: var(--primary-strong);
        }

        .account-item {
            position: relative;
            padding: 15px 14px;
            border-bottom: 1px solid #edf1f6;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            border-left: 3px solid transparent;
        }

        .account-item:hover {
            background: #f8fbff;
        }

        .account-item.active {
            border-left-color: var(--primary);
            background: #eef4ff;
        }

        .account-item.inactive {
            opacity: 0.7;
        }

        .account-item.inactive .account-email-text {
            text-decoration: line-through;
        }

        .account-item.error .account-email-text {
            color: var(--warning);
        }

        .account-email {
            margin-bottom: 0;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
        }

        .account-email-text {
            display: block;
            min-width: 0;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            word-break: normal;
        }

        .account-status-tag {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 0;
            flex-shrink: 0;
        }

        .account-status-tag.status-inactive {
            color: #9a3412;
            background: #ffedd5;
        }

        .account-status-tag.status-error {
            color: #7c2d12;
            background: #fef3c7;
        }

        .account-actions {
            position: static;
            transform: none;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            padding: 0;
            border-radius: 0;
            background: transparent;
            border: 0;
            box-shadow: none;
            opacity: 1;
            justify-content: flex-start;
            margin-top: 10px;
        }

        .account-action-btn {
            border: 1px solid var(--border);
            border-radius: 7px;
            background: #ffffff;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
            padding: 5px 8px;
            cursor: pointer;
            transition: color 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
        }

        .account-action-btn:hover {
            color: var(--text);
            border-color: var(--border-strong);
            background: var(--surface-soft);
        }

        .account-action-btn.copy:hover {
            color: #1d4ed8;
            border-color: #93c5fd;
            background: #eff6ff;
        }

        .account-action-btn.edit:hover {
            color: #4338ca;
            border-color: #c7d2fe;
            background: #eef2ff;
        }

        .account-action-btn.toggle-pause {
            color: #9a3412;
            border-color: #fed7aa;
            background: #fff7ed;
        }

        .account-action-btn.toggle-pause:hover {
            color: #7c2d12;
            border-color: #fb923c;
            background: #ffedd5;
        }

        .account-action-btn.toggle-enable {
            color: #166534;
            border-color: #86efac;
            background: #f0fdf4;
        }

        .account-action-btn.toggle-enable:hover {
            color: #14532d;
            border-color: #4ade80;
            background: #dcfce7;
        }

        .account-action-btn.delete:hover {
            color: var(--danger);
            border-color: #fca5a5;
            background: #fff5f5;
        }

        .content-area {
            display: grid;
            grid-template-columns: 380px minmax(0, 1fr);
            min-width: 0;
        }

        .email-list-panel,
        .email-detail-panel {
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .email-list-panel {
            border-right: 1px solid var(--border);
            background: var(--surface);
        }

        .email-list-panel.hidden {
            display: none;
        }

        .email-list-header,
        .email-detail-toolbar {
            min-height: 56px;
            padding: 0 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-alt);
        }

        .email-list-header h2 {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .email-count {
            color: var(--text-light);
            font-size: 12px;
            font-weight: 500;
        }

        .method-tag {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            border: 1px solid #bfdbfe;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 2px 7px;
        }

        .refresh-btn,
        .back-btn,
        .toggle-list-btn {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text-muted);
            padding: 7px 10px;
            font-size: 12px;
            font-weight: 500;
            line-height: 1;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .email-list-actions {
            display: flex;
            gap: 8px;
        }

        .refresh-btn:hover,
        .back-btn:hover,
        .toggle-list-btn:hover {
            background: var(--surface-soft);
            border-color: var(--border-strong);
            color: var(--text);
        }

        .email-list {
            flex: 1;
            background: var(--surface);
        }

        .email-item {
            border-bottom: 1px solid #edf1f6;
            padding: 11px 14px;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            border-left: 3px solid transparent;
        }

        .email-item:hover {
            background: #f8fbff;
        }

        .email-item.active {
            border-left-color: var(--primary);
            background: #eef4ff;
        }

        .email-item.unread .email-subject {
            font-weight: 600;
            color: var(--text);
        }

        .email-from {
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .email-subject {
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .email-preview {
            color: var(--text-light);
            font-size: 12px;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .email-date {
            color: var(--text-light);
            font-size: 11px;
        }

        .email-detail-panel {
            background: var(--surface);
        }

        .email-detail-toolbar {
            justify-content: flex-start;
            gap: 8px;
        }

        .back-btn {
            display: none;
        }

        #emailDetail {
            flex: 1;
            padding: 20px 22px;
            background: #fbfdff;
        }

        .email-detail-header {
            padding-bottom: 16px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .email-detail-subject {
            color: var(--text);
            font-size: 24px;
            line-height: 1.35;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .email-detail-meta {
            color: var(--text-muted);
            font-size: 13px;
        }

        .email-detail-meta-row {
            display: flex;
            gap: 10px;
            margin-bottom: 6px;
        }

        .email-detail-meta-label {
            width: 54px;
            flex-shrink: 0;
            color: var(--text-light);
        }

        .email-detail-meta-value {
            flex: 1;
            word-break: break-all;
        }

        .email-detail-body {
            color: #1f2937;
            font-size: 15px;
            line-height: 1.7;
        }

        .email-detail-body iframe {
            width: 100%;
            min-height: 560px;
            border: 0;
            background: #ffffff;
            border-radius: var(--radius-sm);
            box-shadow: inset 0 0 0 1px var(--border);
        }

        .email-body-text {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 36px 20px;
            text-align: center;
            color: var(--text-light);
        }

        .empty-state-icon {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface-soft);
            color: #3b82f6;
        }

        .empty-state-icon svg {
            width: 24px;
            height: 24px;
            stroke-width: 1.8;
        }

        .empty-state-text {
            max-width: 320px;
            font-size: 13px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 34px;
        }

        .loading-small {
            padding: 20px;
        }

        .loading-spinner {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #dbe4f2;
            border-top-color: var(--primary);
            animation: spin 0.7s linear infinite;
        }

        .loading-small .loading-spinner {
            width: 22px;
            height: 22px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast {

    <!-- 消息提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // 全局状态
        let apiToken = localStorage.getItem('api_token') || '';
        let currentAccountEmail = null;
        let currentGroupId = null;
        let currentEmails = [];
        let isListVisible = true;
        let groups = [];
        let accountsCache = {};
        let editingGroupId = null;
        let selectedColor = '#1a1a1a';
        let themePreference = localStorage.getItem('ui_theme') || 'system';
        let toastTimer = null;
        const THEME_OPTIONS = ['system', 'light', 'dark'];
        const systemThemeQuery = window.matchMedia('(prefers-color-scheme: dark)');

        const EMPTY_STATE_ICONS = {
            folder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 7.5A1.5 1.5 0 0 1 4.5 6H10l2 2h7.5A1.5 1.5 0 0 1 21 9.5v8A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5z" /></svg>',
            inbox: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 5h16a1 1 0 0 1 1 1v10.5A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5V6a1 1 0 0 1 1-1z" /><path d="M3 13h5l2 3h4l2-3h5" /></svg>',
            email: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 3h6l5 5v13H8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" /><path d="M14 3v5h5" /><path d="M10 13h6M10 17h4" /></svg>',
            warning: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 9v4" /><path d="M12 17h.01" /><path d="M10.3 3.7l-8.1 14A2 2 0 0 0 3.9 21h16.2a2 2 0 0 0 1.7-3.3l-8.1-14a2 2 0 0 0-3.4 0z" /></svg>'
        };

        function isMobileViewport() {
            return window.matchMedia('(max-width: 768px)').matches;
        }

        function getResolvedTheme() {
            if (themePreference === 'system') {
                return systemThemeQuery.matches ? 'dark' : 'light';
            }
            return themePreference;
        }

        function updateThemeToggleLabel() {
            var btn = document.getElementById('themeToggleBtn');
            if (!btn) return;

            var labels = {
                system: '系统',
                light: '浅色',
                dark: '深色'
            };
            var label = labels[themePreference] || labels.system;
            btn.textContent = label;
            btn.title = '切换主题（当前：' + label + '）';
        }

        function applyTheme() {
            document.body.setAttribute('data-theme', getResolvedTheme());
            updateThemeToggleLabel();
        }

        function setTheme(mode, silent) {
            if (THEME_OPTIONS.indexOf(mode) === -1) return;
            themePreference = mode;
            localStorage.setItem('ui_theme', themePreference);
            applyTheme();
            if (!silent) {
                var messageMap = {
                    system: '主题已切换为跟随系统',
                    light: '主题已切换为浅色',
                    dark: '主题已切换为深色'
                };
                showToast(messageMap[mode] || '主题已切换', 'info');
            }
        }

        function toggleTheme() {
            var currentIndex = THEME_OPTIONS.indexOf(themePreference);
            if (currentIndex === -1) {
                setTheme('system');
                return;
            }
            var nextMode = THEME_OPTIONS[(currentIndex + 1) % THEME_OPTIONS.length];
            setTheme(nextMode);
        }

        function initTheme() {
            if (THEME_OPTIONS.indexOf(themePreference) === -1) {
                themePreference = 'system';
            }
            applyTheme();

            if (typeof systemThemeQuery.addEventListener === 'function') {
                systemThemeQuery.addEventListener('change', function() {
                    if (themePreference === 'system') {
                        applyTheme();
                    }
                });
            } else if (typeof systemThemeQuery.addListener === 'function') {
                systemThemeQuery.addListener(function() {
                    if (themePreference === 'system') {
                        applyTheme();
                    }
                });
            }
        }

        function initPanelEntrance() {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.body.classList.add('ui-ready');
                return;
            }
            requestAnimationFrame(function() {
                document.body.classList.add('ui-ready');
            });
        }

        function applyStagger(container, selector) {
            if (!container || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                return;
            }

            var items = container.querySelectorAll(selector);
            items.forEach(function(item, index) {
                item.style.setProperty('--stagger-delay', Math.min(index, 10) * 32 + 'ms');
                item.classList.add('stagger-in');
            });
        }

        function syncMobileStep() {
            if (!currentAccountEmail) {
                document.getElementById('emailListPanel').classList.remove('hidden');
                document.getElementById('emailDetailToolbar').style.display = 'none';
            }

            if (!isMobileViewport()) {
                document.body.setAttribute('data-mobile-step', 'emails');
                return;
            }

            if (currentAccountEmail) {
                document.body.setAttribute('data-mobile-step', 'emails');
            } else if (currentGroupId) {
                document.body.setAttribute('data-mobile-step', 'accounts');
            } else {
                document.body.setAttribute('data-mobile-step', 'groups');
            }
        }

        function setMobileStep(step) {
            document.body.setAttribute('data-mobile-step', step);
        }

        function goToGroupsStep() {
            document.getElementById('emailListPanel').classList.remove('hidden');
            setMobileStep('groups');
        }

        function goToAccountsStep() {
            if (!currentGroupId) {
                showToast('请先选择分组', 'error');
                return;
            }
            document.getElementById('emailListPanel').classList.remove('hidden');
            document.getElementById('emailDetailToolbar').style.display = 'none';
            setMobileStep('accounts');
        }

        function renderEmptyState(iconKey, text) {
            var safeText = escapeHtml(text || '');
            var icon = EMPTY_STATE_ICONS[iconKey] || EMPTY_STATE_ICONS.inbox;
            return '<div class="empty-state"><div class="empty-state-icon" aria-hidden="true">' + icon + '</div><div class="empty-state-text">' + safeText + '</div></div>';
        }

        // ==================== 认证相关 ====================

        function getHeaders(json) {
            const h = { 'Authorization': 'Bearer ' + apiToken };
            if (json) h['Content-Type'] = 'application/json';
            return h;
        }

        async function apiFetch(path, options) {
            options = options || {};
            options.headers = options.headers || {};
            options.headers['Authorization'] = 'Bearer ' + apiToken;
            if (options.body && typeof options.body === 'string') {
                options.headers['Content-Type'] = 'application/json';
            }
            const resp = await fetch(path, options);
            if (resp.status === 401 || resp.status === 403) {
                // Token 无效，重新登录
                localStorage.removeItem('api_token');
                apiToken = '';
                showLoginOverlay();
                throw new Error('认证失败');
            }
            return resp;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            initPanelEntrance();
            if (!apiToken) {
                showLoginOverlay();
            } else {
                hideLoginOverlay();
                init();
            }
            initColorPicker();
            syncMobileStep();
            window.addEventListener('resize', syncMobileStep);

            // 回车键登录
            document.getElementById('loginToken').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') doLogin();
            });
        });

        function showLoginOverlay() {
            document.getElementById('loginOverlay').classList.remove('hidden');
            setMobileStep('groups');
            document.getElementById('loginToken').focus();
        }

        function hideLoginOverlay() {
            document.getElementById('loginOverlay').classList.add('hidden');
        }

        async function doLogin() {
            const token = document.getElementById('loginToken').value.trim();
            if (!token) {
                document.getElementById('loginError').textContent = '请输入 API Token';
                document.getElementById('loginError').classList.add('show');
                return;
            }

            // 验证 token
            try {
                const resp = await fetch('/api/health', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                // health 端点不需要认证，但我们可以用 groups 端点来验证
                const resp2 = await fetch('/api/groups', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (resp2.status === 401 || resp2.status === 403) {
                    document.getElementById('loginError').textContent = 'Token 验证失败，请重新输入';
                    document.getElementById('loginError').classList.add('show');
                    return;
                }

                const data = await resp2.json();
                if (data.success) {
                    apiToken = token;
                    localStorage.setItem('api_token', token);
                    document.getElementById('loginError').classList.remove('show');
                    hideLoginOverlay();

                    // 直接使用已获取的分组数据
                    groups = data.groups;
                    renderGroupList(groups);
                    updateGroupSelects();
                    syncMobileStep();
                } else {
                    document.getElementById('loginError').textContent = data.message || '验证失败';
                    document.getElementById('loginError').classList.add('show');
                }
            } catch (error) {
                document.getElementById('loginError').textContent = '网络错误，请检查连接';
                document.getElementById('loginError').classList.add('show');
            }
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('api_token');
                apiToken = '';
                currentAccountEmail = null;
                currentGroupId = null;
                currentEmails = [];
                groups = [];
                accountsCache = {};
                document.getElementById('loginToken').value = '';
                document.getElementById('loginError').classList.remove('show');

        function initColorPicker() {
            document.querySelectorAll('.color-option').forEach(function(option) {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(function(o) { o.classList.remove('selected'); });
                    this.classList.add('selected');

                    document.getElementById('customColorInput').value = selectedColor;
                    document.getElementById('customColorHex').value = selectedColor;

            document.getElementById('customColorHex').value = color;
            document.querySelectorAll('.color-option').forEach(function(o) { o.classList.remove('selected'); });
        }

        function selectCustomColorHex(value) {
            var hexPattern = /^#[0-9A-Fa-f]{6}$/;
            if (hexPattern.test(value)) {
                selectedColor = value;
                document.getElementById('customColorInput').value = value;
                document.querySelectorAll('.color-option').forEach(function(o) { o.classList.remove('selected'); });
            } else {

        // ==================== 工具函数 ====================

        function showToast(message, type) {
            type = type || 'info';
            var toast = document.getElementById('toast');
            if (toastTimer) {
                clearTimeout(toastTimer);
            }
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            toastTimer = setTimeout(function() {
                toast.className = 'toast';
                toastTimer = null;
            }, 2800);
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeForJsSingleQuote(text) {
            return String(text || '')
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'");
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                var date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                var now = new Date();
                var isToday = date.toDateString() === now.toDateString();
                if (isToday) {
                    return '今天 ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                } else {
                    return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' }) + ' ' +
                           date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                }
            } catch (e) {
                return dateStr;
            }
        }

        function copyEmail(email) {
            navigator.clipboard.writeText(email).then(function() {
                showToast('邮箱地址已复制', 'success');
            }).catch(function() {
                var textarea = document.createElement('textarea');
                textarea.value = email;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('邮箱地址已复制', 'success');
            });
        }

        // ==================== 分组相关 ====================

        async function loadGroups() {
            var container = document.getElementById('groupList');
            container.innerHTML = '<div class="loading loading-small"><div class="loading-spinner"></div></div>';

            try {
                var response = await apiFetch('/api/groups');
                var data = await response.json();

                if (data.success) {
                    groups = data.groups;
                    renderGroupList(data.groups);
                    updateGroupSelects();

                    if (currentGroupId) {
                        var group = groups.find(function(g) { return g.id === currentGroupId; });
                        if (group) {
                            loadAccountsByGroup(currentGroupId, true);
                        }
                    }
                }
            } catch (error) {
                if (error.message !== '认证失败') {
                    container.innerHTML = renderEmptyState('warning', '加载失败');
                    showToast('加载分组失败', 'error');

        function renderGroupList(groupsData) {
            var container = document.getElementById('groupList');

            if (groupsData.length === 0) {
                container.innerHTML = renderEmptyState('folder', '暂无分组');
                return;
            }

            container.innerHTML = groupsData.map(function(group) {
                var isDefault = group.id === 1;

                       '</div>' +
                       '<div class="group-row-2">' +

                       '<div class="group-actions">' +
                       '<button class="group-action-btn edit" onclick="event.stopPropagation(); editGroup(' + group.id + ')" title="编辑">编辑</button>' +

        async function selectGroup(groupId) {
            currentGroupId = groupId;

            document.querySelectorAll('.group-item').forEach(function(item) {
                item.classList.toggle('active', parseInt(item.dataset.groupId) === groupId);
            });

            var group = groups.find(function(g) { return g.id === groupId; });
            if (group) {
                document.getElementById('currentGroupName').textContent = group.name;
                document.getElementById('currentGroupColor').style.backgroundColor = group.color || '#666';

                var importSelect = document.getElementById('importGroupSelect');
                if (importSelect) {
                    importSelect.value = groupId;
                }

            if (isMobileViewport()) {
                setMobileStep('accounts');

        async function loadAccountsByGroup(groupId, forceRefresh) {
            var container = document.getElementById('accountList');

            if (!forceRefresh && accountsCache[groupId]) {
                renderAccountList(accountsCache[groupId]);
                return;
            }

            container.innerHTML = '<div class="loading loading-small"><div class="loading-spinner"></div></div>';

            try {
                var response = await apiFetch('/api/accounts?group_id=' + groupId);
                var data = await response.json();

                if (data.success) {
                    accountsCache[groupId] = data.accounts;
                    renderAccountList(data.accounts);
                }
            } catch (error) {
                if (error.message !== '认证失败') {
                    container.innerHTML = renderEmptyState('warning', '加载失败');
                }
            }
        }

        function renderAccountList(accounts) {
            var container = document.getElementById('accountList');

            if (accounts.length === 0) {
                container.innerHTML = renderEmptyState('inbox', '该分组暂无邮箱');
                return;
            }

            container.innerHTML = accounts.map(function(acc) {
                var statusTag = '';
                if (acc.status === 'inactive') {
                    statusTag = '<span class="account-status-tag status-inactive">已停用</span>';
                } else if (acc.status === 'error') {
                    statusTag = '<span class="account-status-tag status-error">异常</span>';
                }

                var statusLabel = acc.status === 'active' ? '停用' : '启用';
                var itemClasses = ['account-item'];
                if (currentAccountEmail === acc.email) itemClasses.push('active');
                if (acc.status === 'inactive') itemClasses.push('inactive');
                if (acc.status === 'error') itemClasses.push('error');

                var escapedEmail = escapeHtml(acc.email);
                var emailForJs = escapeForJsSingleQuote(acc.email);
                var statusForJs = escapeForJsSingleQuote(acc.status || 'active');
                var toggleClass = statusLabel === '停用' ? 'toggle-pause' : 'toggle-enable';
                return '<div class="' + itemClasses.join(' ') + '"' +
                       ' onclick="selectAccount(\'' + emailForJs + '\')">' +
                       '<div class="account-email" title="' + escapeHtml(acc.email) + '">' +
                       '<span class="account-email-text">' + escapedEmail + '</span>' + statusTag +
                       '</div>' +
                       '<div class="account-actions">' +
                       '<button class="account-action-btn copy" onclick="event.stopPropagation(); copyEmail(\'' + emailForJs + '\')" title="复制邮箱">复制</button>' +
                       '<button class="account-action-btn ' + toggleClass + '" onclick="event.stopPropagation(); toggleAccountStatus(' + acc.id + ', \'' + statusForJs + '\')" title="' + statusLabel + '">' + statusLabel + '</button>' +
                       '<button class="account-action-btn edit" onclick="event.stopPropagation(); showEditAccountModal(' + acc.id + ')" title="编辑">编辑</button>' +
                       '<button class="account-action-btn delete" onclick="event.stopPropagation(); deleteAccount(' + acc.id + ', \'' + emailForJs + '\')" title="删除">删除</button>' +
                       '</div>' +
                       '</div>';
            }).join('');
            applyStagger(container, '.account-item');
        }

                    select.innerHTML = groups.map(function(g) {

        async function updateAccount() {
            var accountId = document.getElementById('editAccountId').value;
            var oldGroupId = currentGroupId;
            var newGroupId = parseInt(document.getElementById('editGroupSelect').value);

            var payload = {
                email: document.getElementById('editEmail').value.trim(),
                password: document.getElementById('editPassword').value,
                client_id: document.getElementById('editClientId').value.trim(),
                refresh_token: document.getElementById('editRefreshToken').value.trim(),
                group_id: newGroupId,
                remark: document.getElementById('editRemark').value.trim(),
                status: document.getElementById('editStatus').value
            };

            if (!payload.email || !payload.client_id || !payload.refresh_token) {
                showToast('邮箱、Client ID 和 Refresh Token 不能为空', 'error');
                return;
            }

            try {
                var response = await apiFetch('/api/accounts/' + accountId, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });

                var result = await response.json();

                if (result.success) {
                    showToast(result.message, 'success');
                    hideEditAccountModal();
                    delete accountsCache[oldGroupId];
                    if (oldGroupId !== newGroupId) {
                        delete accountsCache[newGroupId];
                    }
                    loadGroups();
                    if (currentGroupId) {
                        loadAccountsByGroup(currentGroupId, true);
                    }
                } else {
                    showToast(result.message || '更新失败', 'error');
                }
            } catch (error) {
                if (error.message !== '认证失败') showToast('更新失败', 'error');
            }
        }

                cb.checked = selectAll;
            });
        }

        async function exportSelectedGroups() {
            var checkboxes = document.querySelectorAll('.export-group-checkbox:checked');
            var groupIds = Array.from(checkboxes).map(function(cb) { return parseInt(cb.value); });

            if (groupIds.length === 0) {
                showToast('请选择要导出的分组', 'error');
                return;
            }

            var format = document.getElementById('exportFormat').value;

            try {
                // Fetch all accounts for selected groups
                var allAccounts = [];
                for (var i = 0; i < groupIds.length; i++) {
                    var response = await apiFetch('/api/accounts?group_id=' + groupIds[i]);
                    var data = await response.json();
                    if (data.success) {
                        // For full format export, we need the full account data
                        for (var j = 0; j < data.accounts.length; j++) {
                            var acc = data.accounts[j];
                            if (format === 'email_only') {
                                allAccounts.push(acc.email);
                            } else {
                                // For full format, we need to get each account's full details
                                var detailResp = await apiFetch('/api/accounts/' + acc.id);
                                var detailData = await detailResp.json();
                                if (detailData.success) {
                                    var a = detailData.account;
                                    allAccounts.push(a.email + '----' + (a.password || '') + '----' + a.client_id + '----' + a.refresh_token);
                                }
                            }
                        }
                    }
                }

                if (allAccounts.length === 0) {
                    showToast('所选分组无邮箱可导出', 'error');
                    return;
                }

                var content = allAccounts.join('\n');
                var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'accounts_export_' + new Date().toISOString().slice(0,10) + '.txt';
                document.body.appendChild(a);
                a.click();
                URL.revokeObjectURL(url);
                document.body.removeChild(a);

                showToast('导出成功：' + allAccounts.length + ' 个账号', 'success');
                hideExportModal();
            } catch (error) {
                if (error.message !== '认证失败') showToast('导出失败', 'error');
            }
        }

            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

            try {
                var response = await apiFetch('/api/emails/' + encodeURIComponent(email) + '?top=20');
                var data = await response.json();

                if (data.success) {
                    currentEmails = data.emails;

                    var methodTag = document.getElementById('methodTag');
                    methodTag.textContent = 'Graph API';
                    methodTag.style.display = 'inline';

                    document.getElementById('emailCount').textContent = '(' + data.emails.length + ')';

                    renderEmailList(data.emails);
                    if (isMobileViewport()) {
                        setMobileStep('emails');
                    }
                } else {
                    container.innerHTML = renderEmptyState('warning', data.message || '加载失败');
                }
            } catch (error) {
                if (error.message !== '认证失败') {
                    container.innerHTML = renderEmptyState('warning', '网络错误，请重试');
                }
            }
        }

        function renderEmailList(emails) {
            var container = document.getElementById('emailList');

            if (emails.length === 0) {
                container.innerHTML = renderEmptyState('inbox', '收件箱为空');
                return;
            }

            container.innerHTML = emails.map(function(email, index) {
                var messageIdForJs = escapeForJsSingleQuote(email.id);
                return '<div class="email-item ' + (email.is_read === false ? 'unread' : '') + '"' +
                       ' onclick="selectEmail(\'' + messageIdForJs + '\', ' + index + ')">' +
                       '<div class="email-from">' + escapeHtml(email.from) + '</div>' +
                       '<div class="email-subject">' + escapeHtml(email.subject || '无主题') + '</div>' +
                       '<div class="email-preview">' + escapeHtml(email.body_preview || '') + '</div>' +
                       '<div class="email-date">' + formatDate(email.date) + '</div>' +
                       '</div>';
            }).join('');
            applyStagger(container, '.email-item');
        }

        async function selectEmail(messageId, index) {
            document.querySelectorAll('.email-item').forEach(function(item, i) {
                item.classList.toggle('active', i === index);
            });

            document.getElementById('emailDetailToolbar').style.display = 'flex';

            var container = document.getElementById('emailDetail');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

            try {
                var response = await apiFetch('/api/emails/' + encodeURIComponent(currentAccountEmail) + '/' + encodeURIComponent(messageId));
                var data = await response.json();

                if (data.success) {
                    renderEmailDetail(data.email);
                    if (isMobileViewport()) {
                        document.getElementById('emailListPanel').classList.add('hidden');
                    }
                } else {
                    container.innerHTML = renderEmptyState('warning', data.message || '加载失败');
                }
            } catch (error) {
                if (error.message !== '认证失败') {
                    container.innerHTML = renderEmptyState('warning', '网络错误，请重试');
                }
            }
        }

        function renderEmailDetail(email) {
            var container = document.getElementById('emailDetail');

            var isHtml = email.body_type === 'html' ||
                        (email.body && (email.body.indexOf('<html') !== -1 || email.body.indexOf('<div') !== -1 || email.body.indexOf('<p>') !== -1));

            var toStr = '';
            if (Array.isArray(email.to)) {
                toStr = email.to.join(', ');
            } else {
                toStr = email.to || '-';
            }

            var ccStr = '';
            if (Array.isArray(email.cc) && email.cc.length > 0) {
                ccStr = email.cc.join(', ');
            } else if (typeof email.cc === 'string' && email.cc) {
                ccStr = email.cc;
            }

            var bodyContent = isHtml
                ? '<iframe id="emailBodyFrame" onload="adjustIframeHeight(this)"></iframe>'
                : '<div class="email-body-text">' + escapeHtml(email.body) + '</div>';

            var ccRow = ccStr ? '<div class="email-detail-meta-row"><span class="email-detail-meta-label">抄送</span><span class="email-detail-meta-value">' + escapeHtml(ccStr) + '</span></div>' : '';

            container.innerHTML = '<div class="email-detail-header">' +
                '<div class="email-detail-subject">' + escapeHtml(email.subject || '无主题') + '</div>' +
                '<div class="email-detail-meta">' +
                '<div class="email-detail-meta-row"><span class="email-detail-meta-label">发件人</span><span class="email-detail-meta-value">' + escapeHtml(email.from) + '</span></div>' +
                '<div class="email-detail-meta-row"><span class="email-detail-meta-label">收件人</span><span class="email-detail-meta-value">' + escapeHtml(toStr) + '</span></div>' +
                ccRow +
                '<div class="email-detail-meta-row"><span class="email-detail-meta-label">时间</span><span class="email-detail-meta-value">' + formatDate(email.date) + '</span></div>' +
                '</div>' +
                '</div>' +
                '<div class="email-detail-body">' + bodyContent + '</div>';

            if (isHtml) {
                var iframe = document.getElementById('emailBodyFrame');
                if (iframe) {
                    var resolvedTheme = getResolvedTheme();
                    var frameTextColor = resolvedTheme === 'dark' ? '#d6e2f0' : '#1f2937';
                    var frameBgColor = resolvedTheme === 'dark' ? '#15283d' : '#ffffff';
                    var frameLinkColor = resolvedTheme === 'dark' ? '#96bcff' : '#005fb8';
                    var htmlContent = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>' +
                        'body{font-family:\'PingFang SC\',\'Hiragino Sans GB\',\'Microsoft YaHei\',\'Noto Sans CJK SC\',sans-serif;font-size:15px;line-height:1.65;color:' + frameTextColor + ';margin:0;padding:0;background-color:' + frameBgColor + ';}' +
                        'img{max-width:100%;height:auto;}a{color:' + frameLinkColor + ';}' +
                        '</style></head><body>' + email.body + '</body></html>';
                    iframe.srcdoc = htmlContent;
                }
            }
        }

        function adjustIframeHeight(iframe) {
            try {
                setTimeout(function() {
                    if (iframe.contentDocument && iframe.contentDocument.body) {
                        var height = iframe.contentDocument.body.scrollHeight;
                        iframe.style.height = Math.max(height + 40, 600) + 'px';
                    }
                }, 100);
                setTimeout(function() {
                    if (iframe.contentDocument && iframe.contentDocument.body) {
                        var height = iframe.contentDocument.body.scrollHeight;
                        iframe.style.height = Math.max(height + 40, 600) + 'px';
                    }
                }, 500);
            } catch (e) {
                console.log('Cannot adjust iframe height:', e);
            }
        }

        function toggleEmailList() {
            if (isMobileViewport()) {
                return;
            }
            var panel = document.getElementById('emailListPanel');
            var toggleText = document.getElementById('toggleListText');

            isListVisible = !isListVisible;

            if (isListVisible) {
                panel.classList.remove('hidden');
                toggleText.textContent = '隐藏列表';
            } else {
                panel.classList.add('hidden');
                toggleText.textContent = '显示列表';
            }
        }

        function showEmailList() {
            if (isMobileViewport()) {
                document.getElementById('emailListPanel').classList.remove('hidden');
                document.getElementById('emailDetailToolbar').style.display = 'none';
                return;
            }
            document.getElementById('emailListPanel').classList.remove('hidden');
            isListVisible = true;
            document.getElementById('toggleListText').textContent = '隐藏列表';
        }

        function refreshEmails() {
            if (currentAccountEmail) {
                loadEmails(currentAccountEmail);
            } else {
                showToast('请先选择一个邮箱账号', 'error');
            }
        }

        // ==================== 键盘快捷键 ====================

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                hideAddGroupModal();
                hideAddAccountModal();
                hideEditAccountModal();
                hideExportModal();
            }
        });
    </script>
</body>
</html>
